[[cli_command]]
name = "check"
required_flags = []
optional_flags = ["--suite", "--all", "--tag", "--feature", "--manifest", "--json"]
exit_codes = [0, 1, 2]
help_contains = [
  "Run one suite or every suite from fixture3.yaml.",
  "discovers fixtures",
  "writes received files",
  "received output with `approved.normalized.json`",
  "Use `--suite <name>`, `--all`, `--tag <tag>`, or `--feature <feature>`",
  "`--json` writes one record per selected suite",
  "Exit code is 2 if any",
  "Exit code is 1 if any suite differs",
]

[[cli_command]]
name = "diff"
required_flags = ["--suite"]
optional_flags = ["--manifest", "--refresh", "--json"]
exit_codes = [0, 1, 2]
help_contains = [
  "Show the latest stored diff",
  "Without `--refresh`",
  "does not rerun",
  "Use `--json` when an agent needs the diff status",
]

[[cli_command]]
name = "approve"
required_flags = ["--suite"]
optional_flags = ["--manifest", "--change"]
exit_codes = [0, 2]
help_contains = [
  "Publish the last received output",
  "approved.normalized.json",
  "--change <path>",
]

[[cli_command]]
name = "status"
required_flags = []
optional_flags = ["--suite", "--all", "--tag", "--feature", "--manifest", "--json"]
exit_codes = [0, 2]
help_contains = [
  "Show one suite or every suite",
  "Use `--suite <name>`, `--all`, `--tag <tag>`, or `--feature <feature>`",
  "Omit all target flags",
  "Use `--json` when an agent needs approved",
]

[[cli_command]]
name = "init"
required_flags = []
optional_flags = ["--manifest"]
exit_codes = [0, 2]
help_contains = [
  "Write an example fixture3.yaml manifest",
  "fixture glob",
  "command argv",
]

[[cli_command]]
name = "explain"
required_flags = ["--suite"]
optional_flags = ["--manifest", "--json"]
exit_codes = [0, 2]
help_contains = [
  "Show resolved suite configuration",
  "does not run the project command",
]

[[cli_command]]
name = "doctor"
required_flags = []
optional_flags = ["--manifest", "--json"]
exit_codes = [0, 2]
help_contains = [
  "Validate fixture3.yaml without running project behavior",
  "Exit 0 means the manifest shape",
]

[[cli_command]]
name = "new"
required_flags = []
optional_flags = []
exit_codes = [0, 2]
help_contains = [
  "Create fixture approval scaffolding",
  "does not edit fixture3.yaml",
]

[[cli_help]]
argv = ["cargo", "run", "-p", "fixture3-cli", "--", "--help"]
contains = [
  "runs project commands against fixture files",
  "Use it for fixture-based approval testing",
  "Run `fixture3 init` to create a usable example fixture3.yaml.",
  "Manifest schema:",
  "Feature pipeline:",
  "`{fixtures}` is replaced with every discovered fixture path.",
  "The only supported `output.format` is `json`.",
  "`output.normalizer` is optional.",
  "approved_dir/approved.normalized.json is the committed approved output.",
  "received_dir/received.raw.json stores command stdout from the latest check.",
  "diff_dir/diff.txt is the human-readable diff.",
  "`fixture3 check --all` runs every suite",
  "`fixture3 check --tag <tag>` runs every suite with that tag.",
  "`fixture3 check --json` writes suite results as structured JSON.",
  "`fixture3 explain --suite <suite>` shows the resolved suite configuration.",
  "`fixture3 doctor` validates manifest paths, fixtures, features, and storage.",
  "`fixture3 diff --suite <suite> --refresh` reruns check before showing the diff.",
  "The path should point to the reviewed change note, issue, PR, or local change file.",
  "A suite is one fixture approval check",
  "Exit codes:",
  "fixture3.yaml",
]

[[cli_help]]
argv = ["cargo", "run", "-p", "fixture3-cli", "--", "--version"]
contains = [
  "fixture3 0.1.6",
]

