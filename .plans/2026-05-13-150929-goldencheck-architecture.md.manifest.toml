[[command]]
name = "static-g3rs"
argv = ["g3rs", "validate", "--path", ".", "--rules-only"]

[[command]]
name = "compile"
argv = ["cargo", "check"]

[[command]]
name = "format"
argv = ["cargo", "fmt", "--check"]

[[command]]
name = "clippy"
argv = ["cargo", "clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[[command]]
name = "self-check"
argv = ["cargo", "run", "-p", "goldencheck-cli", "--", "check", "--suite", "self", "--manifest", "goldencheck.yaml"]
