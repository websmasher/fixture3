name: Binary Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: contains(matrix.target, 'linux')
        run: cross build --release -p goldencheck-cli --bin goldencheck --target ${{ matrix.target }}

      - name: Build native
        if: contains(matrix.target, 'apple')
        run: cargo build --release -p goldencheck-cli --bin goldencheck --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../goldencheck-${{ matrix.target }}.tar.gz goldencheck
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: goldencheck-${{ matrix.target }}.tar.gz
