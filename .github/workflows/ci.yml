name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Verify manifest layers
        run: |
          python3 scripts/verify-manifest.py tree
          python3 scripts/verify-manifest.py forbidden
          python3 scripts/verify-manifest.py config
          python3 scripts/verify-manifest.py modules
          python3 scripts/verify-manifest.py cli
      - name: Verify Rust
        run: |
          cargo fmt --check
          cargo check
          cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Verify fixture3 self suite
        run: cargo run -p fixture3-cli -- check --suite self --manifest fixture3.yaml
      - name: Stub package dry run
        run: cargo publish -p fixture3 --dry-run
